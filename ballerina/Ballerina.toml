[package]
org = "ballerinax"
name = "nats"
version = "3.3.1"
authors = ["Ballerina"]
keywords = ["Vendor/NATS", "Area/Messaging", "Type/Connector", "Type/Trigger"]
repository = "https://github.com/ballerina-platform/module-ballerinax-nats"
icon = "icon.png"
license = ["Apache-2.0"]
distribution = "2201.12.0"

[platform.java21]
graalvmCompatible = true

[[platform.java21.dependency]]
path = "./lib/jnats-2.20.4.jar"

[[platform.java21.dependency]]
groupId = "io.ballerina.stdlib"
artifactId = "nats-native"
version = "3.3.1"
path = "../native/build/libs/nats-native-3.3.1-SNAPSHOT.jar"

[[platform.java21.dependency]]
groupId = "io.ballerina.stdlib"
artifactId = "constraint-native"
version = "1.7.0"
path = "./lib/constraint-native-1.7.0.jar"

[build-options]
observabilityIncluded=true
